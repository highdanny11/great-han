        body {

        }

        .font-sans {
            font-family: "Chiron Hei HK", "Roboto", ui-sans-serif, system-ui, -apple-system,
                BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, "Noto Sans",

        /* 品牌色系變量 */
        :root {
            --brand-primary: #066828;
            --brand-light: #002816;
            --brand-dark: #D2D9D2;
            --brand-red: #e1380e;
        }

        a {
            text-decoration: none;
        }

        /* Swiper按鈕自訂樣式 */
        .swiper-button-prev,
        .swiper-button-next {
            color: var(--brand-primary);
            width: 50px;
            height: 50px;
            background: rgba(255, 255, 255, 0.2);
            border-radius: 50%;
            transition: all 0.3s ease;
            border: none;
        }

        .swiper-button-prev:hover,
        .swiper-button-next:hover {
            background: rgba(255, 255, 255, 0.9);
        }

        .swiper-button-prev::after,
        .swiper-button-next::after {
            font-size: 20px;
        }

        .swiper-pagination-bullet {
            background: white;
            opacity: 0.5;
            width: 12px;
            height: 12px;
        }

        .swiper-pagination-bullet-active {
            opacity: 1;
        }

        /* Hero內容動畫 */
        .hero-content h1 {
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.3);
        }

        .hero-content h2 {
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.3);
        }

        /* Coverflow 效果 - 桌機限定 */
        @media (min-width: 768px) {
            #hero .swiper {
                padding: 40px 0 60px !important;
                overflow: visible !important;
            }

            #hero .swiper-slide {
                width: 65%;
                border-radius: 12px;
                overflow: hidden;
                box-shadow: 0 15px 40px rgba(0, 0, 0, 0.35);
            }

            #hero .swiper-slide-active {
                box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5);
            }

            #hero .swiper-slide img {
                display: block;
                width: 100%;
                height: auto;
            }
        }

        /* 頁籤樣式 */
        .tab-btn {
            position: relative;
            outline: none;
        }

        .tab-btn.active {
            background: var(--brand-primary);
            color: white;
        }

        /* Vue 頁籤內容容器 */
        .vue-tab-container {
            position: relative;
        }

        .vue-tab-content {
            width: 100%;
        }

        /* Vue Transition 效果 - 淡入淡出 */
        .fade-enter-active,
        .fade-leave-active {
            transition: opacity 0.5s ease;
        }

        .fade-enter-from,
        .fade-leave-to {
            opacity: 0;
        }

        /* Vue Transition 效果 - 滑動 */
        .slide-left-enter-active,
        .slide-left-leave-active,
        .slide-right-enter-active,
        .slide-right-leave-active {
            transition: all 0.3s ease;
        }

        .slide-left-enter-from {
            opacity: 0;
            transform: translateX(10%);
        }

        .slide-left-leave-to {
            opacity: 0;
            transform: translateX(-10%);
        }

        .slide-right-enter-from {
            opacity: 0;
            transform: translateX(-10%);
        }

        .slide-right-leave-to {
            opacity: 0;
            transform: translateX(10%);
        }

        button {
            border: none;
            outline: none;
            all: unset;
            cursor: pointer;
        }

        button:focus {
            outline: none;
        }

        /* Vue v-cloak 防止閃爍 */
        [v-cloak] .vue-content {
            display: none;
        }


        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .ribbon {
            font-size: 24px;
            font-weight: bold;
            color: #fff;
        }

        .ribbon {
            --r: .4em;
            /* control the ribbon shape (the radius) */

            position: absolute;
            top: -9px;
            inset-inline: calc(-1*var(--r));
            text-align: center;
            line-height: 1.8;
            padding: 0 .5em calc(2*var(--r));
            border-radius: var(--r);
            --_g: 100%/var(--r) calc(2*var(--r)) no-repeat;
            background:
                radial-gradient(100% 50% at right, #0005 98%, #0000 101%) 0 var(--_g),
                radial-gradient(100% 50% at left, #0005 98%, #0000 101%) 100% var(--_g),
                conic-gradient(from 90deg at var(--r) calc(100% - 2*var(--r)), #0000 25%, var(--brand-primary) 0) 0 0/calc(100% - var(--r)) 100%;
